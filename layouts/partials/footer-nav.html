{{- $here := .RelPermalink -}}
{{- $isShared := and .File (eq .File.ContentBaseName "shared") -}}
{{- $shared := site.GetPage "shared" -}}
<nav class="bottom-nav" aria-label="Day navigation">
  <a href="{{ site.Home.RelPermalink }}"{{ if .IsHome }} aria-current="page"{{ end }}>Home</a>
  <a href="{{ $shared.RelPermalink }}"{{ if $isShared }} aria-current="page"{{ end }}>Shared</a>
  {{- range sort (where site.RegularPages "Section" "days") "Params.weight" -}}
    {{- $short := .Params.short | default "·" -}}
    <a href="{{ .RelPermalink }}"{{ if eq $here .RelPermalink }} aria-current="page"{{ end }}>{{ $short }}</a>
  {{- end -}}
</nav>
